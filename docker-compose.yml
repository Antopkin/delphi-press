services:

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── App (FastAPI / uvicorn) ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DELPHI_PRODUCTION=1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    expose:
      - "8000"
    volumes:
      - sqlite_data:/app/data
      - ${INVERSE_DATA_DIR:-delphi_inverse}:/app/data/inverse
      - docs_data:/app/docs-site/site
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          # Bumped from 768M → 1024M on 2026-04-09.
          # `docker stats` consistently showed the app container sitting
          # at 700+ MiB (>90% of the old limit) during normal idle —
          # one traffic spike or one long prediction run away from an
          # OOM kill. Total VPS RAM is ~7.8 GiB; raising this by 256 MiB
          # still leaves comfortable headroom after the outline-moskino
          # stack (1.5 GiB outline + 768 MiB postgres + 256 MiB redis),
          # faun (200 MiB), afisha-bot (130 MiB), redis (384 MiB), and
          # nginx (128 MiB). First noticed during the moskino_site
          # bootstrap session — see docs-site/docs/infrastructure/config.md.
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Worker (ARQ) ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: ["arq", "src.worker.WorkerSettings"]
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DELPHI_PRODUCTION=1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - frontend
    volumes:
      - sqlite_data:/app/data
      - ${INVERSE_DATA_DIR:-delphi_inverse}:/app/data/inverse
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
      # Attached to faun's docker network so nginx can reverse-proxy
      # faun.antopkin.ru → faun-cloud-1:8000 by container name.
      - faun_net
      # Same pattern for moskino-workshops.antopkin.ru →
      # outline-moskino:3000 (the outline-moskino stack lives in
      # /home/deploy/apps/outline-moskino). `outline-net` is declared
      # external below and owned by that project.
      - outline-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
      - ./nginx/faun-security-headers.conf:/etc/nginx/conf.d/faun-security-headers.conf:ro
      # No moskino-security-headers.conf — Outline sends its own
      # (nonce-based, via helmet), adding ours here produced duplicate
      # CSP headers and broke Outline's loader.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./src/web/static:/var/www/static:ro
      - docs_data:/var/www/docs:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
  sqlite_data:
  delphi_inverse:
  docs_data:

networks:
  backend:
    internal: true
  frontend:
    driver: bridge
  # Owned by the faun project — we attach nginx to it as an external
  # consumer, never create or tear it down from here.
  faun_net:
    external: true
  # Owned by the outline-moskino project — same pattern as faun_net.
  outline-net:
    external: true
