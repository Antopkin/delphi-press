name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Fail fast on any command error. Previously the script ran
            # without `set -e`, so a silent `git pull` failure (e.g. a
            # dirty working tree) would let the rest of the script
            # continue and rebuild containers from the stale checkout —
            # no actual deploy happened, and nobody noticed until the
            # unrelated curl at the end finally tripped exit 1.
            set -euo pipefail

            cd ~/apps/delphi-press

            # --ff-only refuses to merge or rebase; if someone has
            # modified files on the VPS out-of-band, this hard-errors
            # instead of silently leaving a merge mess. When it fails,
            # the operator must reconcile via `git stash` (or by
            # committing the local edits and pushing), then re-run.
            git pull --ff-only origin main

            docker compose down
            # Drop named volumes that shadow freshly built docs/assets.
            # `docker compose down` does NOT remove named volumes, so a
            # stale docs_data volume persists across builds. This bit us
            # when mkdocs-llmstxt was added: the new llms.txt never
            # reached /docs/ because nginx served the pre-plugin volume.
            # `|| true` keeps this idempotent on first deploy.
            docker volume rm delphi-press_docs_data 2>/dev/null || true
            docker compose build
            docker compose up -d

            # Give the app enough time to finish sequelize migrations
            # and nginx enough time to re-resolve upstreams.
            sleep 15

            # Health-check through the real public path (nginx -> app).
            # The previous check targeted http://localhost:8000/ which
            # does not work: the app container only `expose:`s 8000
            # internally, it does not publish it to the host, so curl
            # was always failing with "connection refused" and the
            # Deploy workflow was marked failed even when the deploy
            # itself had succeeded.
            curl -fsS --max-time 10 https://delphi.antopkin.ru/api/v1/health
