{# src/web/templates/login.html -- Login page. #}
{% extends "base.html" %}

{% block title %}Вход -- Delphi Press{% endblock %}

{% block content %}
<section style="max-width: 420px; margin: 2rem auto;">
    <h1>Вход</h1>

    {% if error %}
    <p class="fn-form-error" role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com"
               required autocomplete="email">

        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 8 символов"
               required autocomplete="current-password" minlength="8">

        <input type="hidden" name="next" value="{{ next | default('/') }}">

        <button type="submit">Войти</button>
    </form>

    <p style="text-align: center; margin-top: 1rem;">
        <small>Нет аккаунта? <a href="/register">Зарегистрироваться</a></small>
    </p>
</section>
{% endblock %}
