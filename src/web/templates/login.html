{# src/web/templates/login.html -- Login page. #}
{% extends "base.html" %}

{% block title %}Вход -- Delphi Press{% endblock %}

{% block content %}
<section class="max-w-md mx-auto pt-8 animate-fade-in-up">
    <div class="text-center mb-6">
        <a href="/" class="font-heading text-xl no-underline text-text-heading"><strong>Delphi Press</strong></a>
    </div>

    <h1 class="text-2xl mb-6">Вход</h1>

    {% if error %}
    <p class="px-4 py-3 mt-4 bg-red-50 border border-red-200 rounded-md text-confidence-speculative text-sm" role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-semibold mb-1">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com"
                   required autocomplete="email"
                   class="w-full rounded-md border-border px-3 py-2">
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold mb-1">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Минимум 8 символов"
                   required autocomplete="current-password" minlength="8"
                   class="w-full rounded-md border-border px-3 py-2">
        </div>

        <input type="hidden" name="next" value="{{ next | default('/') }}">

        <button type="submit"
                class="w-full bg-primary text-white font-semibold py-2.5 px-4 rounded-md hover:bg-primary-hover cursor-pointer">
            Войти
        </button>
    </form>

    <p class="text-center mt-6">
        <small class="text-text-muted">Нет аккаунта? <a href="/register">Зарегистрироваться</a></small>
    </p>
</section>
{% endblock %}
