{# src/web/templates/register.html -- Registration page. #}
{% extends "base.html" %}

{% block title %}Регистрация -- Delphi Press{% endblock %}

{% block content %}
<section class="fn-auth-section">
    <div class="fn-auth-logo">
        <a href="/" class="fn-logo"><strong>Delphi Press</strong></a>
    </div>

    <h1>Регистрация</h1>

    {% if error %}
    <p class="fn-form-error" role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="/register">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com"
               required autocomplete="email">

        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 8 символов"
               required autocomplete="new-password" minlength="8">

        <button type="submit">Зарегистрироваться</button>
    </form>

    <p class="fn-text-center">
        <small>Уже есть аккаунт? <a href="/login">Войти</a></small>
    </p>
</section>
{% endblock %}
