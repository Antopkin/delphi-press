site_name: Delphi Press — Методология
site_description: Внутренняя документация системы прогнозирования заголовков СМИ
site_url: https://delphi.antopkin.ru/docs/
repo_url: https://github.com/Antopkin/delphi-press
repo_name: Antopkin/delphi-press

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  font:
    text: Source Sans 3
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

strict: true

plugins:
  - search
  - include-markdown
  - copy-to-llm
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Start here:
          - index.md
          - for-agents.md
        Architecture:
          - architecture/*.md
        Data collection:
          - data-collection/*.md
        Delphi method:
          - delphi-method/*.md
        Methodology:
          - methodology/*.md
        Polymarket:
          - polymarket/*.md
        Generation:
          - generation/*.md
        Evaluation:
          - evaluation/*.md
        Dead ends:
          - dead-ends/*.md
        Frontend:
          - frontend/*.md
        API:
          - api/*.md
        Infrastructure:
          - infrastructure/*.md
        Roadmap:
          - roadmap/*.md
        ADR:
          - adr/*.md
        Conventions:
          - conventions/*.md
        Appendix:
          - appendix/*.md
          - bibliography.md
          - changelog.md

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js
  - js/katex-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Antopkin/delphi-press
    - icon: fontawesome/brands/telegram
      link: https://t.me/Antopkin

nav:
  - Главная: index.md
  - For agents: for-agents.md
  - Архитектура:
    - Обзор системы: architecture/overview.md
    - "Pipeline: 9 стадий": architecture/pipeline.md
    - LLM-инфраструктура: architecture/llm.md
    - Claude Code mode: architecture/claude-code-mode.md
  - Сбор данных:
    - Стадии 1-2: data-collection/stages-1-2.md
    - Внешние API: data-collection/api-integrations.md
  - Методология:
    - Суп��рпрогнозисты: methodology/superforecasters.md
    - Walk-forward валидация: methodology/walk-forward.md
    - Imitation Learning: methodology/imitation-learning.md
    - Фазы inverse module: methodology/inverse-phases.md
  - Метод Дельфи:
    - Анализ (стадия 3): delphi-method/analysis.md
    - Раунды Дельфи (стадии 4-5): delphi-method/delphi-rounds.md
  - Генерация:
    - Стадии 6-9: generation/stages-6-9.md
  - Polymarket:
    - Обратная задача: polymarket/inverse.md
  - Оценка качества:
    - Метрики: evaluation/metrics.md
  - Dead Ends:
    - 21 case study: dead-ends/case-studies.md
  - Дорожная карта:
    - Дорожная карта: roadmap/tasks.md
    - "Дискуссия: архетипы": roadmap/discussion.md
  - Frontend:
    - Web UI: frontend/web-ui.md
  - API:
    - REST Reference: api/reference.md
  - Инфраструктура:
    - База данных: infrastructure/database.md
    - Безопасность: infrastructure/security.md
    - Конфигурация: infrastructure/config.md
    - Reverse proxy: infrastructure/reverse-proxy.md
    - Скрипты: infrastructure/scripts.md
  - ADR:
    - adr/index.md
    - "0001 — Dual-provider": adr/0001-claude-code-vs-openrouter.md
    - "0002 — Metaculus deprecation": adr/0002-metaculus-deprecation.md
    - "0003 — conditionId join": adr/0003-conditionid-join-fix.md
    - "0004 — DuckDB 2GB limit": adr/0004-duckdb-2gb-limit.md
    - "0005 — Fernet/JWT keys": adr/0005-fernet-key-handling.md
  - Conventions:
    - Code style: conventions/code-style.md
    - Contributing docs: conventions/contributing-docs.md
  - Приложения:
    - Глоссарий: appendix/glossary.md
    - Data Flow: appendix/data-flow.md
    - Промпты агентов: appendix/prompts.md
    - Известные ограничения: appendix/gotchas.md
    - Библиография: bibliography.md
    - Changelog: changelog.md
