# ═══════════════════════════════════════════════════════════════════════════
# Server block for moskino-workshops.antopkin.ru
#
# Reverse proxy for an Outline (https://www.getoutline.com) knowledge base
# running in a separate docker-compose stack on the same VPS. Connected to
# this nginx container via the `outline-net` external docker network.
#
# Upstream container: outline-moskino (listens on :3000 internally)
# TLS cert: /etc/letsencrypt/live/moskino-workshops.antopkin.ru/ (Let's
#           Encrypt, webroot challenge via /var/www/certbot)
#
# Part of: gleaming-strolling-avalanche plan (Phase 1, activated in Phase 6)
# DO NOT merge this PR until:
#   - Phase 5: TLS cert issued (otherwise nginx fails to start)
#   - Phase 5: outline-moskino container is running on outline-net
# ═══════════════════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name moskino-workshops.antopkin.ru;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name moskino-workshops.antopkin.ru;

    ssl_certificate     /etc/letsencrypt/live/moskino-workshops.antopkin.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moskino-workshops.antopkin.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers (Outline-specific) ───────────────────────────────
    # Intentionally NOT including /etc/nginx/conf.d/security-headers.conf:
    # nginx does NOT inherit add_header when a child block defines its own,
    # and Outline needs a more permissive CSP than delphi-press (React SPA,
    # TipTap editor requires 'unsafe-eval', WebSocket for real-time collab,
    # image blobs from user uploads). All headers are duplicated inline.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' wss://moskino-workshops.antopkin.ru; frame-src 'self' https:; media-src 'self' blob:; worker-src 'self' blob:" always;

    # Max upload — Outline file attachments. Raise later if videos needed.
    client_max_body_size 25M;

    # Access log — use stdout so logs are captured by Docker's logging
    # driver and don't accumulate inside the container.
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # ── Auth endpoints (brute-force protection: 5 req/min) ───────────────
    # Must be BEFORE `location /` so the regex matches first.
    location ~ ^/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://outline-moskino:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ── Outline app (WebSocket-aware for real-time collaboration) ────────
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://outline-moskino:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade — required for Outline's real-time collab.
        # $connection_upgrade is defined via `map` in nginx.conf.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Forwarded-Host  $host;

        # Long-poll + collaboration timeouts. Outline can hold connections
        # open for a while during real-time editing sessions.
        proxy_read_timeout    300s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;

        # Don't buffer — Outline streams responses on some endpoints.
        proxy_buffering off;
        proxy_cache     off;
    }
}
