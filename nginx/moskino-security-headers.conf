# Security headers tailored for moskino-workshops.antopkin.ru (Outline).
# Overrides the shared security-headers.conf because Outline's React +
# ProseMirror editor needs a substantially more permissive CSP:
#   - 'unsafe-eval' for ProseMirror / TipTap editor internals
#   - wss://moskino-workshops.antopkin.ru for real-time collaboration
#   - blob: and data: images for user-uploaded attachments and drag-drop
#   - worker-src blob: for web workers used by the editor
#
# nginx does NOT inherit add_header across scopes when a child scope
# defines any, so every header delphi-press sets also has to be set here.

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options            "SAMEORIGIN" always;
add_header X-Content-Type-Options     "nosniff" always;
add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' wss://moskino-workshops.antopkin.ru; frame-src 'self' https:; media-src 'self' blob:; worker-src 'self' blob:" always;
