worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript
               application/json application/javascript
               image/svg+xml;

    # ── Rate Limiting ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=predictions:10m rate=2r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=sse_conn:10m;

    # ── Upstream ────────────────────────────────────────────────────────────
    upstream app {
        server app:8000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name delphi.antopkin.ru;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name delphi.antopkin.ru;

        ssl_certificate     /etc/letsencrypt/live/delphi.antopkin.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/delphi.antopkin.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ────────────────────────────────────────────────
        # Extracted to include file so location blocks with own add_header
        # can include them too (nginx does not inherit parent add_header).
        include /etc/nginx/conf.d/security-headers.conf;

        # ── Static Files ────────────────────────────────────────────────────
        location /static/ {
            alias /var/www/static/;
            expires 7d;
            add_header Cache-Control "public";
            include /etc/nginx/conf.d/security-headers.conf;
            access_log off;
        }

        # ── SSE Endpoint (BEFORE general /api) ──────────────────────────────
        location ~* ^/api/v1/predictions/[^/]+/stream$ {
            limit_conn sse_conn 5;

            proxy_pass         http://app;
            proxy_http_version 1.1;

            # Critical for SSE: disable ALL buffering
            proxy_buffering    off;
            proxy_cache        off;
            gzip               off;

            # Keep upstream connection alive
            proxy_set_header   Connection '';
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding off;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_max_temp_file_size 0;
        }

        # ── Predictions POST (expensive, strict rate limit) ─────────────────
        location = /api/v1/predictions {
            limit_req zone=predictions burst=3 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            client_max_body_size 1M;
        }

        # ── Auth endpoints (brute-force protection: 5 req/min) ──────────────
        location ~ ^/(api/v1/auth/(login|register)|login|register)$ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
            client_max_body_size 1M;
        }

        # ── Documentation (static MkDocs) ───────────────────────────────────
        location /docs/ {
            alias /var/www/docs/;
            index index.html;
            try_files $uri $uri/ $uri/index.html /docs/404.html;
            expires 1d;
            add_header Cache-Control "public, no-transform";
            include /etc/nginx/conf.d/security-headers.conf;
            access_log off;
        }

        # ── General API + App ───────────────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout  300s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
            client_max_body_size 2M;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Faun — AI Forest Monitoring (faun.antopkin.ru)
    # ══════════════════════════════════════════════════════════════════════════

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name faun.antopkin.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name faun.antopkin.ru;

        ssl_certificate     /etc/letsencrypt/live/faun.antopkin.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/faun.antopkin.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:FaunSSL:2m;
        ssl_session_timeout 1d;

        include /etc/nginx/conf.d/faun-security-headers.conf;

        client_max_body_size 25M;

        # ── WebSocket (live audio stream) ───────────────────────────────────
        location /ws {
            proxy_pass         http://faun-cloud-1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ── General (API + dashboard) ───────────────────────────────────────
        location / {
            proxy_pass         http://faun-cloud-1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";

            proxy_read_timeout  300s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }
    }

}
