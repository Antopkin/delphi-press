worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript
               application/json application/javascript
               image/svg+xml;

    # ── Rate Limiting ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=predictions:10m rate=2r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=sse_conn:10m;

    # ── Runtime DNS resolver (Docker embedded DNS) ─────────────────────────
    # 127.0.0.11 is Docker's built-in DNS for bridge networks. We need it
    # here so that server blocks which reverse-proxy into *external* docker
    # networks (faun_net, outline-net, ...) can resolve upstream hostnames
    # at request time instead of at config parse time. Without this, when
    # nginx starts before a cross-project container (faun-cloud-1,
    # outline-moskino, ...) is known to Docker DNS, nginx dies with
    #     [emerg] host not found in upstream "<container>"
    # and falls into a crash loop until restarted.
    #
    # 30s cache TTL overrides Docker's default 600s TTL — a container
    # restart should be picked up within 30 seconds of 502s, not 10 minutes.
    # ipv6=off because Docker's bridge DNS does not return AAAA records.
    #
    # Declared at http-level so every server block inherits it (DRY). Note
    # this is only used when proxy_pass targets a VARIABLE (e.g.
    # `set $upstream "faun-cloud-1:8000"; proxy_pass http://$upstream;`) —
    # a bare `server ... :8000` in an upstream{} block still resolves at
    # config parse time regardless of this setting.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── WebSocket upgrade map ──────────────────────────────────────────────
    # Translates the client's Upgrade header into the value we want in the
    # `Connection:` header sent to the upstream:
    #   Upgrade: websocket       →  Connection: upgrade
    #   (no Upgrade header)      →  Connection: close
    # Used by server blocks that reverse-proxy WebSocket traffic:
    #   - faun.antopkin.ru /ws (live audio stream)
    #   - moskino-workshops.antopkin.ru / (Outline real-time collab)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream ────────────────────────────────────────────────────────────
    upstream app {
        server app:8000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name delphi.antopkin.ru;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name delphi.antopkin.ru;

        ssl_certificate     /etc/letsencrypt/live/delphi.antopkin.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/delphi.antopkin.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ────────────────────────────────────────────────
        # Extracted to include file so location blocks with own add_header
        # can include them too (nginx does not inherit parent add_header).
        include /etc/nginx/conf.d/security-headers.conf;

        # ── Static Files ────────────────────────────────────────────────────
        location /static/ {
            alias /var/www/static/;
            expires 7d;
            add_header Cache-Control "public";
            include /etc/nginx/conf.d/security-headers.conf;
            access_log off;
        }

        # ── SSE Endpoint (BEFORE general /api) ──────────────────────────────
        location ~* ^/api/v1/predictions/[^/]+/stream$ {
            limit_conn sse_conn 5;

            proxy_pass         http://app;
            proxy_http_version 1.1;

            # Critical for SSE: disable ALL buffering
            proxy_buffering    off;
            proxy_cache        off;
            gzip               off;

            # Keep upstream connection alive
            proxy_set_header   Connection '';
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding off;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_max_temp_file_size 0;
        }

        # ── Predictions POST (expensive, strict rate limit) ─────────────────
        location = /api/v1/predictions {
            limit_req zone=predictions burst=3 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            client_max_body_size 1M;
        }

        # ── Auth endpoints (brute-force protection: 5 req/min) ──────────────
        location ~ ^/(api/v1/auth/(login|register)|login|register)$ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
            client_max_body_size 1M;
        }

        # ── Documentation (static MkDocs) ───────────────────────────────────
        location /docs/ {
            alias /var/www/docs/;
            index index.html;
            try_files $uri $uri/ $uri/index.html /docs/404.html;
            expires 1d;
            add_header Cache-Control "public, no-transform";
            include /etc/nginx/conf.d/security-headers.conf;
            access_log off;
        }

        # ── General API + App ───────────────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout  300s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
            client_max_body_size 2M;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Faun — AI Forest Monitoring (faun.antopkin.ru)
    # ══════════════════════════════════════════════════════════════════════════

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name faun.antopkin.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name faun.antopkin.ru;

        ssl_certificate     /etc/letsencrypt/live/faun.antopkin.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/faun.antopkin.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:FaunSSL:2m;
        ssl_session_timeout 1d;

        include /etc/nginx/conf.d/faun-security-headers.conf;

        client_max_body_size 25M;

        # NB: both locations below use `set $faun_upstream ...; proxy_pass
        # http://$faun_upstream;` instead of a bare `proxy_pass
        # http://faun-cloud-1:8000;`. The variable forces nginx to resolve
        # the hostname at request time against the http-level `resolver`
        # directive, avoiding the cold-start crash loop described there.

        # ── WebSocket (live audio stream) ───────────────────────────────────
        location /ws {
            set $faun_upstream "faun-cloud-1:8000";
            proxy_pass         http://$faun_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ── General (API + dashboard) ───────────────────────────────────────
        location / {
            set $faun_upstream "faun-cloud-1:8000";
            proxy_pass         http://$faun_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";

            proxy_read_timeout  300s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Moskino — internal knowledge base on Outline (moskino-workshops.antopkin.ru)
    # ══════════════════════════════════════════════════════════════════════════
    # Reverse proxy into the outline-moskino stack living in the
    # /home/deploy/apps/outline-moskino docker-compose project. The
    # `outline-net` network is declared external here; outline-moskino
    # owns and creates it.
    #
    # See docs-site/docs/infrastructure/reverse-proxy.md for the full
    # multi-tenant architecture and the reasoning behind the runtime
    # DNS `set $var; proxy_pass http://$var;` pattern.

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name moskino-workshops.antopkin.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name moskino-workshops.antopkin.ru;

        ssl_certificate     /etc/letsencrypt/live/moskino-workshops.antopkin.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/moskino-workshops.antopkin.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:MoskinoSSL:2m;
        ssl_session_timeout 1d;

        # Outline-tuned CSP (permits 'unsafe-eval' for TipTap, wss:// for
        # real-time collab, blob:/data: images for uploads). Duplicates
        # all other security headers inline because nginx does not
        # inherit add_header across scopes when the child scope defines
        # any of its own.
        include /etc/nginx/conf.d/moskino-security-headers.conf;

        # Outline file attachments default to ≤ 10 MB; 25 MB gives
        # comfortable headroom for images and PDFs. Raise if video uploads
        # are needed later.
        client_max_body_size 25M;

        # Send logs to stdout/stderr so Docker's logging driver captures
        # them (and ops can `docker logs delphi-press-nginx-1 | grep moskino`).
        access_log /dev/stdout main;
        error_log  /dev/stderr warn;

        # Auth endpoints — brute-force protection via the shared `auth`
        # rate-limit zone declared at http-level.
        location ~ ^/auth/ {
            limit_req zone=auth burst=5 nodelay;

            set $outline_upstream "outline-moskino:3000";
            proxy_pass         http://$outline_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port  443;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Everything else: WebSocket-aware reverse proxy to Outline.
        location / {
            limit_req zone=general burst=20 nodelay;

            set $outline_upstream "outline-moskino:3000";
            proxy_pass         http://$outline_upstream;
            proxy_http_version 1.1;

            # Real-time collaboration uses wss://.
            # $connection_upgrade is defined via `map` in the http{} block.
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Port  443;
            proxy_set_header   X-Forwarded-Host  $host;

            # Long-poll / collaboration sessions can stay open a while.
            proxy_read_timeout    300s;
            proxy_send_timeout    60s;
            proxy_connect_timeout 10s;

            # Outline streams some endpoints — do not buffer.
            proxy_buffering off;
            proxy_cache     off;
        }
    }

}
